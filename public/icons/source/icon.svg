<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Build One">
  <!--
    Build One PWA icon - master source. Mirrors the iOS AppIcon-1024:
    pure black background, white "B1" wordmark set in the system display sans.
    Sized so the wordmark sits inside the 80% maskable safe zone.
  -->
  <rect width="512" height="512" fill="#000000"/>
  <text
    x="256"
    y="376"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="372"
    font-weight="500"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="-4"
  >B1</text>
</svg>
